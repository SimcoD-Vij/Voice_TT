services:
  tts:
    build: .
    image: qwen3-tts-cloner
    container_name: tts-cloner
    volumes:
      - ./models:/app/models
      - ./dataset:/app/dataset
      - ./outputs:/app/outputs
      - ./Qwen3-TTS:/app/Qwen3-TTS
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    stdin_open: true
    tty: true

  tts-cpu:
    build: .
    image: qwen3-tts-cloner
    container_name: tts-cloner-cpu
    volumes:
      - ./models:/app/models
      - ./dataset:/app/dataset
      - ./outputs:/app/outputs
      - ./Qwen3-TTS:/app/Qwen3-TTS
    deploy:
      resources:
        limits:
          memory: 8G
    stdin_open: true
    tty: true

  pocket-tts:
    build:
      context: .
      dockerfile: pocket-tts.Dockerfile
    image: dograh-pocket-tts
    container_name: pocket-tts
    ports:
      - "8100:8000"
    volumes:
      - pocket_tts_models:/root/.cache/huggingface
      - pocket_tts_voices:/voices
    networks:
      - app-network
    environment:
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - TOKENIZERS_PARALLELISM=false
      - HF_HUB_DOWNLOAD_TIMEOUT=300
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /tmp/pocket_tts_ready"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 400s

networks:
  app-network:
    driver: bridge

volumes:
  pocket_tts_models:
  pocket_tts_voices:
